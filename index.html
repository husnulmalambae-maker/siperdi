<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPERDI - Data Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #198754; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="text-center">
        <h2>Sistem Informasi SIPERDI</h2>
        <p class="text-muted">Data di bawah ini sinkron otomatis dengan Google Sheets</p>
    </div>
    
    <div class="table-responsive mt-4">
        <table class="table table-bordered table-striped" id="tabel-data">
            <thead class="table-success">
                <tr id="tabel-header">
                    </tr>
            </thead>
            <tbody id="tabel-body">
                <tr>
                    <td colspan="5" class="text-center">Sedang memuat data terbaru...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // GANTI TULISAN DI BAWAH INI DENGAN LINK CSV GOOGLE SHEETS ANDA
    const urlSheets = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7LQf8Is-kUMscv5dKnGPqOWpr7hw-HtTaXxkz9mkf1bpxOgpk1ewU6NPC5f4a5-SemOH71bBs88Du/pub?output=csv";

    async function ambilData() {
        try {
            const response = await fetch(urlSheets);
            const dataText = await response.text();
            
            // Mengubah format CSV menjadi Array
            const baris = dataText.split("\n").map(b => b.split(","));
            
            // 1. Buat Header Tabel
            const headerHtml = baris[0].map(kolom => `<th>${kolom}</th>`).join("");
            document.getElementById("tabel-header").innerHTML = headerHtml;
            
            // 2. Buat Isi Tabel
            let bodyHtml = "";
            for (let i = 1; i < baris.length; i++) {
                if (baris[i].length > 1 && baris[i][0].trim() !== "") { // Memastikan baris tidak kosong
                    bodyHtml += "<tr>";
                    baris[i].forEach(kolom => {
                        bodyHtml += `<td>${kolom}</td>`;
                    });
                    bodyHtml += "</tr>";
                }
            }
            document.getElementById("tabel-body").innerHTML = bodyHtml;
            
        } catch (error) {
        console.error("Gagal mengambil data:", error);
        document.getElementById("tabel-body").innerHTML = "<tr><td colspan='5' class='text-center text-danger'>Gagal memuat data dari Google Sheets. Pastikan link sudah benar.</td></tr>";
    }
    }

    // Jalankan fungsi saat halaman web dibuka
    ambilData();
</script>

</body>
</html>
